repos:
  - repo: https://github.com/ministryofjustice/devsecops-hooks
    rev: v1.5.0
    hooks:
      - id: baseline
        name: Ministry of Justice - Security scan

  - repo: local
    hooks:
      - id: lint
        name: Lint check
        entry: npm run validate:all
        language: system
        pass_filenames: false

      - id: spellcheck
        name: Spell check
        entry: npm run spellcheck
        language: system
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-check
        name: Ruff Check
        args: [ --fix ]
      - id: ruff-format
        name: Ruff Format
  
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.11
    hooks:
      - id: uv-lock