name: Credential Posture Monitoring

on:
  schedule:
    - cron: "0 6 * * 1"      # every Monday 06:00 UTC
  workflow_dispatch: {}        # manual run for testing

permissions:
  contents: read

jobs:
  credential-posture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml pandas pydantic

      - name: Run Stage 8 credential posture assessment
        env:
          GITHUB_TOKEN: ${{ secrets.MOJ_GITHUB_PAT }}
        run: |
          python main.py \
            --scripts github_workflow \
            --auth pat \
            --config-file config/monitoring_config.yaml

      - name: Check credential posture
        env:
          CREDENTIAL_POSTURE_CSV: output/github_workflow_posture/credentials_analysis/github_workflow_credential_posture.csv
        run: |
          python security-tools/credential_posture_wrapper.py

      - name: Upload posture CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: credential-posture-${{ github.run_id }}
          path: output/github_workflow_posture/credentials_analysis/github_workflow_credential_posture.csv
          retention-days: 90
          