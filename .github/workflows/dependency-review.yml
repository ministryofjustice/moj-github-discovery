---
name: Dependency Review

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6.0.1

      - name: Dependency Review
        uses: actions/dependency-review-action@v4.8.2
        with:
          config-file: '.github/dependency-review-config.yml'
